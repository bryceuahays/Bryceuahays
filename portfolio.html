<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio | Brycinema</title>

<style>
:root {
  --bg: #0a0f1f;
  --bg-soft: #11182d;
  --card: rgba(255, 255, 255, 0.06);
  --text: #f5f7fb;
  --muted: #b8c0d9;
  --line: rgba(255, 255, 255, 0.12);
  --accent: #7c9cff;
  --accent-2: #8ef0d0;
  --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, sans-serif;

  background:
    radial-gradient(circle at top left, rgba(124, 156, 255, 0.16), transparent 35%),
    radial-gradient(circle at top right, rgba(142, 240, 208, 0.14), transparent 30%),
    linear-gradient(180deg, #0b1020 0%, #090d18 100%);

  color: var(--text);
}

/* GLOBAL LINK FIX */
a {
  color: inherit;
  text-decoration: none;
}

a:visited {
  color: inherit;
  text-decoration: none;
}

/* BRAND FIX (THIS IS THE IMPORTANT PART) */
.brand,
.brand:visited,
.brand:active,
.brand:hover {
  color: var(--text);
  text-decoration: none;
}

/* LAYOUT */
.container {
  width: min(1120px, calc(100% - 2rem));
  margin: 0 auto;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(14px);
  background: rgba(7, 10, 18, 0.68);
  border-bottom: 1px solid var(--line);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.95rem 0;
}

.brand {
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 0.95rem;
}

.brand span {
  color: var(--accent-2);
}

.nav-links {
  display: flex;
  gap: 1rem;
}

.nav-links a {
  color: var(--muted);
  font-size: 0.95rem;
}

.nav-links a:hover {
  color: var(--text);
}

/* HEADER */
h1 {
  margin: 2rem 0;
  font-size: 2.2rem;
}

/* FILTERS */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  margin-bottom: 2rem;
}

.filter-btn {
  padding: 0.55rem 1rem;
  border-radius: 999px;
  border: 1px solid var(--line);
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  color: white;
  font-weight: 600;
}

.filter-btn.active {
  background: var(--accent);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  overflow: hidden;
  transition: 0.3s ease;
  box-shadow: var(--shadow);
}

.card.dimmed {
  opacity: 0.25;
  filter: grayscale(60%);
  pointer-events: none;
}

.video-frame {
  aspect-ratio: 16 / 9;
  background: #05070f;
}

.video-frame iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

.card-body {
  padding: 1rem;
}

.tag {
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

/* MOBILE */
@media(max-width: 900px){
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="brand">Bry<span>Cinema</span></a>
    <div class="nav-links">
      <a href="index.html#work">Work</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="index.html#services">Services</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </div>
</nav>

<div class="container">
  <h1>All Work</h1>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="youtube">Youtube</button>
    <button class="filter-btn" data-filter="corporate">Corporate</button>
    <button class="filter-btn" data-filter="essay">Video Essay</button>
    <button class="filter-btn" data-filter="highlight">Highlights</button>
    <button class="filter-btn" data-filter="howto">How To</button>
    <button class="filter-btn" data-filter="vlog">Vlog</button>
  </div>

  <div class="grid">

    <div class="card" data-tags="youtube essay">
      <div class="video-frame">
        <iframe src="https://www.youtube.com/embed/jki7Iy1gVds"></iframe>
      </div>
      <div class="card-body">
        <div class="tag">YouTube • Video Essay</div>
        <h3>Project Title</h3>
      </div>
    </div>

    <div class="card" data-tags="corporate">
      <div class="video-frame">
        <iframe src="https://www.youtube.com/embed/k43KfK_l2Kw"></iframe>
      </div>
      <div class="card-body">
        <div class="tag">Corporate</div>
        <h3>Brand Project</h3>
      </div>
    </div>

    <div class="card" data-tags="highlight youtube">
      <div class="video-frame">
        <iframe src="https://www.youtube.com/embed/D7p7hpBU-JY"></iframe>
      </div>
      <div class="card-body">
        <div class="tag">Highlight</div>
        <h3>Highlight Edit</h3>
      </div>
    </div>

  </div>
</div>

<script>
const buttons = document.querySelectorAll(".filter-btn");
const cards = document.querySelectorAll(".card");

buttons.forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelector(".active").classList.remove("active");
    btn.classList.add("active");

    const filter = btn.dataset.filter;

    cards.forEach(card => {
      const tags = card.dataset.tags;

      if(filter === "all" || tags.includes(filter)){
        card.classList.remove("dimmed");
      } else {
        card.classList.add("dimmed");
      }
    });
  });
});
</script>

</body>
</html>
